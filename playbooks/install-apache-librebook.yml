---
- hosts: all
  become: true
  vars:
    php_enable_php_fpm: true
    apache_vhosts:
      - servername: 'tom1.tsand.org'
        documentroot: /var/www/html
        extra_parameters: |
              ProxyPassMatch ^/(.*\.php(/.*)?)$ "fcgi://127.0.0.1:9000/var/www/example"


  roles:
    - geerlingguy.apache
    - geerlingguy.php
    - geerlingguy.apache-php-fpm
