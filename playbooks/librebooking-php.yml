# Run this playbook last
# This playbook ensures all the php modules are installed
# and ensures apache modules.
# This playbook clones the librebooking/develop branch from github
# clone to /var/www/html/librebooking
# ownership set to www-data:www-data
# created tpl_c for cache with public write
# This script will configure www-data user for shell,
# to allow for "su - www-data" to run validation tools,
# like "composer preflight ---"
# like "composer install"
# This script will install company branding
# NOTICE the line
#    - name: edit the install.password in config.php
# You will need to set the "installation password" if you do not
# want to use the default.  You will be prompted for it during
# install.

---
- hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: install librebooking php modules
      apt:
        pkg:
          - php-mysql
          - composer
    - name: setup apache2 modules
      shell: |
        a2enmod headers
        a2enmod rewrite
    - name: clone code
      shell: |
        cd /var/www/html
        git clone https://github.com/LibreBooking/librebooking.git
        cd /var/www/html/librebooking
        mkdir -p ./tpl_c
        chmod 0777 ./tpl_c
        cd /var/www/html
        chown -R www-data:www-data librebooking
    - name: set www-data account for shell access
      user:
        name: www-data
        shell: /bin/bash
    - name: run composer install
      shell: |
        cd /var/www/html/librebooking
        composer -n install
    - name: setup config file
      shell: |
        cd /var/www/html/librebooking/config
        cp config.dist.php config.php
        chown www-data:www-data config.php
    - name: edit the install.password in config.php
      lineinfile:
        path: /var/www/html/librebooking/config/config.php
        regexp: "^(\\s*'install.password') => '',"
        line: "\\1 => 'password',"
        backrefs: true
    - name: edit the script.url in config.php
      lineinfile:
        path: /var/www/html/librebooking/config/config.php
        regexp: "^(\\s*'script.url') => '',"
        line: "\\1 => 'http://{{ ansible_fqdn }}/librebooking/Web',"
        backrefs: true
    - name: edit the company.name in config.php
      lineinfile:
        path: /var/www/html/librebooking/config/config.php
        regexp: "^(\\s*'company.name') => '',"
        line: "\\1 => 'Nokia',"
        backrefs: true
    - name: edit the company.url in config.php
      lineinfile:
        path: /var/www/html/librebooking/config/config.php
        regexp: "^(\\s*'company.url') => '',"
        line: "\\1 => 'http://www.nokia.com',"
        backrefs: true

